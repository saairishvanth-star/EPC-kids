<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>All-in-One App</title>
<style>
body {font-family: Arial; background:#111; color:#fff; padding:20px;}
.card {background:#1c1c1c; padding:15px; border-radius:10px; margin-bottom:10px;}
button {padding:6px 10px; margin:5px; cursor:pointer;}
.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  background:#fff; color:#000;
  padding:10px 20px; border-radius:8px;
}
</style>
</head>
<body>

<h2>Members</h2>
<div id="members"></div>

<h2>Profile</h2>
<div id="profile"></div>

<script>
// ===== DATA =====
let members = [
  {id:1, name:"Saai", role:"Admin", isGod:true},
  {id:2, name:"User1", role:"Member", isGod:false},
  {id:3, name:"User2", role:"Member", isGod:false}
];

let currentUser = members[0];
let currentDmUser = members[1];

// ===== RENDER MEMBERS =====
function renderMembers(){
  const div = document.getElementById("members");
  div.innerHTML = "";

  members.forEach(u=>{
    div.innerHTML += `
      <div class="card">
        ${u.name} (${u.role})
        <br>
        <button onclick="viewProfile(${u.id})">View</button>
        <button onclick="toggleGod(${u.id})">
          ${u.isGod ? "Remove God" : "Make God"}
        </button>
        <button onclick="editAny(${u.id})">Edit</button>
      </div>
    `;
  });
}

// ===== PROFILE =====
function viewProfile(id){
  const user = members.find(u=>u.id===id);
  document.getElementById("profile").innerHTML = `
    <div class="card">
      <h3>${user.name}</h3>
      <p>${user.role}</p>
      <button onclick="editProfile(${user.id})">Edit Profile</button>
      <button onclick="callUser('${user.name}')">📞 Call</button>
    </div>
  `;
}

// ===== EDIT SELF =====
function editProfile(id){
  const user = members.find(u=>u.id===id);
  let name = prompt("New name:", user.name);
  let role = prompt("New role:", user.role);

  if(name) user.name = name;
  if(role) user.role = role;

  renderMembers();
  viewProfile(id);
}

// ===== ADMIN EDIT =====
function editAny(id){
  const user = members.find(u=>u.id===id);
  let name = prompt("Edit name:", user.name);
  if(name) user.name = name;

  renderMembers();
}

// ===== GOD MODE =====
function toggleGod(id){
  const user = members.find(u=>u.id===id);
  user.isGod = !user.isGod;

  showNotification(user.name + (user.isGod ? " is now GOD 😈" : " removed from GOD"));
  renderMembers();
}

// ===== CALL =====
function callUser(name){
  showNotification("📞 Calling " + name);

  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg");
  audio.play();
}

// ===== NOTIFICATION =====
function showNotification(msg){
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerText = msg;

  document.body.appendChild(toast);

  setTimeout(()=>toast.remove(),3000);
}

// INIT
renderMembers();
</script>

</body>
</html>
